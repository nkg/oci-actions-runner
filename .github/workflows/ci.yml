name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck entrypoint.sh

  build-and-test:
    name: build + container-structure-test
    runs-on: ubuntu-latest
    needs: [hadolint, shellcheck]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: oci-actions-runner:ci
          # Single arch on CI to keep build time reasonable; release
          # workflow does multi-arch.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install container-structure-test
        run: |
          curl -fsSL -o /tmp/cst \
            https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x /tmp/cst
          sudo mv /tmp/cst /usr/local/bin/container-structure-test

      - name: Run container-structure-test
        run: |
          container-structure-test test \
            --image oci-actions-runner:ci \
            --config tests/container-structure-test.yaml

  pr-title:
    name: PR title is conventional
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            test
            refactor
            perf
          requireScope: false
